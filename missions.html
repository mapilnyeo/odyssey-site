<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>커리큘럼 | Odyssey AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --sb: 240px;
            --top: 48px;
            --m1: #6d28d9;
            --m2: #0891b2;
            --m1l: #ede9fe;
            --m2l: #cffafe;
            --border: #e5e7eb;
            --text: #111827;
            --sub: #4b5563;
            --faint: #9ca3af;
            --bg: #fff;
            --sbg: #f9fafb;
            --hover: #f3f4f6
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif
        }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden
        }

        /* topbar */
        .topbar {
            height: var(--top);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            background: #fff;
            flex-shrink: 0;
            z-index: 100
        }

        .tlogo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text);
            font-size: 14px;
            font-weight: 700
        }

        .tgem {
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, var(--m1), var(--m2));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px
        }

        .tsep {
            width: 1px;
            height: 16px;
            background: var(--border)
        }

        .tsub {
            font-size: 12px;
            color: var(--faint)
        }

        .tback {
            margin-left: auto;
            font-size: 12px;
            color: var(--sub);
            text-decoration: none;
            padding: 5px 10px;
            border: 1px solid var(--border);
            border-radius: 6px
        }

        .tback:hover {
            background: var(--hover)
        }

        /* layout */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        /* sidebar */
        .sidebar {
            width: var(--sb);
            flex-shrink: 0;
            background: var(--sbg);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            scrollbar-width: thin
        }

        .sg-label {
            padding: 16px 16px 6px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--faint)
        }

        .si {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            cursor: pointer;
            position: relative;
            transition: background .12s;
            border-left: 3px solid transparent
        }

        .si:hover {
            background: var(--hover)
        }

        .si.active {
            background: #fff;
            border-left-color: var(--m1)
        }

        .si.m2.active {
            border-left-color: var(--m2)
        }

        .snum {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 5px;
            flex-shrink: 0
        }

        .si.m1 .snum {
            background: var(--m1l);
            color: var(--m1)
        }

        .si.m2 .snum {
            background: var(--m2l);
            color: var(--m2)
        }

        .slabel {
            font-size: 12.5px;
            color: var(--sub);
            line-height: 1.3
        }

        .si.active .slabel {
            color: var(--text);
            font-weight: 500
        }

        .sexp {
            font-size: 10px;
            margin-left: auto;
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
            padding: 1px 5px;
            border-radius: 3px;
            flex-shrink: 0
        }

        /* main */
        .main {
            flex: 1;
            overflow-y: auto
        }

        .ca {
            padding: 44px 52px;
            max-width: 800px;
            animation: fi .2s ease
        }

        @keyframes fi {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            margin-bottom: 10px
        }

        .eyebrow.m1 {
            color: var(--m1)
        }

        .eyebrow.m2 {
            color: var(--m2)
        }

        .ltitle {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -.02em;
            line-height: 1.2;
            margin-bottom: 20px
        }

        .cmdbar {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            border-radius: 8px;
            margin-bottom: 28px;
            font-size: 13px
        }

        .cmdbar.m1 {
            background: var(--m1l);
            border: 1px solid #c4b5fd
        }

        .cmdbar.m2 {
            background: var(--m2l);
            border: 1px solid #a5f3fc
        }

        .clbl {
            color: var(--faint);
            font-size: 11px
        }

        .cval {
            font-family: monospace;
            font-weight: 700;
            font-size: 14px
        }

        .cmdbar.m1 .cval {
            color: var(--m1)
        }

        .cmdbar.m2 .cval {
            color: var(--m2)
        }

        .summary {
            font-size: 15px;
            color: var(--sub);
            line-height: 1.8;
            margin-bottom: 32px;
            padding: 20px 24px;
            background: var(--sbg);
            border: 1px solid var(--border);
            border-radius: 10px
        }

        .sec {
            margin-bottom: 32px
        }

        .sht {
            font-size: 12px;
            font-weight: 600;
            color: var(--faint);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .sht::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border)
        }

        ul.dlist {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 9px
        }

        ul.dlist li {
            display: flex;
            align-items: flex-start;
            gap: 11px;
            font-size: 14px;
            color: var(--sub);
            line-height: 1.6
        }

        .ck {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            flex-shrink: 0;
            margin-top: 2px;
            font-weight: 700
        }

        .ck.m1 {
            background: var(--m1l);
            color: var(--m1)
        }

        .ck.m2 {
            background: var(--m2l);
            color: var(--m2)
        }

        /* key concepts */
        .concepts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px
        }

        .concept-card {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff
        }

        .concept-card h4 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px
        }

        .concept-card p {
            font-size: 12px;
            color: var(--sub);
            line-height: 1.5
        }

        /* prompts */
        .prompt-list {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .prompt-item {
            padding: 12px 16px;
            background: var(--sbg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text);
            line-height: 1.5;
            position: relative
        }

        .prompt-item::before {
            content: '"';
            font-size: 18px;
            color: var(--m1);
            margin-right: 6px;
            font-weight: 700
        }

        .prompt-tip {
            font-size: 11px;
            color: var(--faint);
            margin-top: 4px
        }

        .taglist {
            display: flex;
            flex-wrap: wrap;
            gap: 6px
        }

        .tag {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 100px;
            background: var(--sbg);
            color: var(--sub);
            border: 1px solid var(--border)
        }

        /* nav */
        .cnav {
            display: flex;
            justify-content: space-between;
            padding: 20px 52px 36px;
            border-top: 1px solid var(--border);
            margin-top: 8px
        }

        .navbtn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            color: var(--sub);
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: all .15s
        }

        .navbtn:hover {
            background: var(--hover);
            color: var(--text);
            border-color: #d1d5db
        }

        .navbtn.hidden {
            visibility: hidden
        }

        /* mbtn */
        .mbtn {
            display: none;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            color: var(--text)
        }

        @media(max-width:680px) {
            .mbtn {
                display: flex
            }

            .sidebar {
                position: fixed;
                top: var(--top);
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                z-index: 200;
                transform: translateX(-100%);
                transition: transform .25s
            }

            .sidebar.open {
                transform: translateX(0)
            }

            .ca {
                padding: 28px 20px
            }

            .cnav {
                padding: 16px 20px 28px
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <button class="mbtn" id="mb">☰</button>
        <a href="index.html" class="tlogo">

                tags: ['Next.js 빌드', '로컬 실행', '스크린샷 피드백', '바이브코딩']
            },

            '2-4': {
                m: 'm2', n: '2.4', cmd: '/start-2-4',
                title: '레슨 2.4 — GitHub로 코드 저장',
                summary: '지금 만든 퀴즈는 내 컴퓨터에만 있어요. 노트북이 고장나면 사라집니다. <strong>GitHub</strong>는 코드를 위한 Google Drive예요. 코드를 GitHub에 올려두면(push) 백업도 되고, 다음 단계인 인터넷 배포도 가능해집니다. "GitHub에 푸시해줘" 한마디로 Gemini가 모두 처리합니다.',

                    { t: 'git commit', d: '"이 시점의 코드를 저장"하는 명령어. 실행 취소 포인트를 만드는 것.' },

                dos: ['Vercel 계정을 만들고(GitHub로 가입 권장) CLI로 인증합니다', 'vercel --prod --yes 명령어로 배포를 실행합니다', '실제 URL이 생성되면 브라우저에서 열어봅니다', '스마트폰에서 접속하고 친구에게 링크를 보냅니다', '코드 수정 → GitHub 푸시 → 자동 업데이트 흐름을 이해합니다'],

                    { t: '프로덕션 배포', d: '실제 인터넷에 공개하는 것. --prod 플래그 사용.' },

                prompts: ['vercel --version', 'vercel --prod --yes', 'GitHub에 최신 변경사항을 푸시해줘 (Vercel이 자동으로 업데이트됨)'],
                tags: ['Vercel', '프로덕션 배포', '자동 배포', '실제 URL', '출시 🎉']

        const ORDER = ['0', '1-1', '1-2', '1-3', '1-4', '1-5', '1-6', '1-7', '1-8', '2-1', '2-2', '2-3', '2-4', '2-5'];
        let cur = '0';

        function render(id) {
            const d = D[id];
            const isM0 = d.m === 'm0';
            const isM1 = d.m === 'm1';
            const mc = isM0 ? 'm1' : d.m;
            const dosHtml = d.dos.map(x => `<li><span class="ck ${mc}">✓</span><span>${x}</span></li>`).join('');
            const conceptsHtml = d.concepts.map(c => `<div class="concept-card"><h4>${c.t}</h4><p>${c.d}</p></div>`).join('');
            const promptsHtml = d.prompts.map(p => `<div class="prompt-item">${p}</div>`).join('');
            // install cards (for lesson 0)
            const installHtml = isM0 && d.install ? d.install.map(i => `
    <div style="border:1px solid var(--border);border-radius:10px;padding:20px 22px;margin-bottom:12px;background:#fff">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:22px">${i.icon}</span>
        <strong style="font-size:16px">${i.name}</strong>
        ${i.cmd ? `<code style="font-size:11px;background:#f3f4f6;padding:2px 8px;border-radius:4px;margin-left:auto;color:#374151">${i.cmd}</code>` : ''}
      </div>
      <p style="font-size:13px;color:#4b5563;margin-bottom:${i.sub ? '8px' : '12px'}">${i.desc}</p>
      ${i.sub ? `<p style="font-size:12px;color:#6b7280;background:#f9fafb;padding:8px 10px;border-radius:6px;margin-bottom:12px;font-family:monospace">${i.sub}</p>` : ''}
      <a href="${i.url}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#6d28d9;text-decoration:none;padding:8px 14px;border:1px solid #c4b5fd;border-radius:7px;background:#ede9fe">↗ ${i.btn}</a>
    </div>`).join('') : '';

            document.getElementById('ca').innerHTML = `
    <div class="eyebrow ${mc}">${isM0 ? '시작 전' : (isM1 ? '모듈 1 · 기초 다지기' : '모듈 2 · 바이브 코딩')} &nbsp;·&nbsp; 레슨 ${d.n}</div>
    <h1 class="ltitle">${d.title}</h1>
    <div class="cmdbar ${mc}"><span class="clbl">시작 명령어</span><span class="cval">${d.cmd}</span></div>
    <div class="summary">${d.summary}</div>
    ${isM0 && d.install ? `<div class="sec"><div class="sht">설치 목록 (3가지)</div>${installHtml}</div>` : `<div class="sec"><div class="sht">이 레슨에서 할 것들</div><ul class="dlist">${dosHtml}</ul></div>`}
    <div class="sec"><div class="sht">핵심 개념</div><div class="concepts-grid">${conceptsHtml}</div></div>
    ${d.prompts && d.prompts.length ? `<div class="sec"><div class="sht">써볼 수 있는 프롬프트 예시</div><div class="prompt-list">${promptsHtml}</div></div>` : ''}
  `;
            const idx = ORDER.indexOf(id);
            const pb = document.getElementById('pb'), nb = document.getElementById('nb');
            pb.className = 'navbtn' + (idx === 0 ? ' hidden' : '');
            nb.className = 'navbtn' + (idx === ORDER.length - 1 ? ' hidden' : '');
            if (idx > 0) { const p = D[ORDER[idx - 1]]; document.getElementById('pl').textContent = `${p.n} ${p.title.split('—')[0].trim()}`; }
            if (idx < ORDER.length - 1) { const n = D[ORDER[idx + 1]]; document.getElementById('nl').textContent = `${n.n} ${n.title.split('—')[0].trim()}`; }
            document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function go(el, id) {
            document.querySelectorAll('.si').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            cur = id; render(id);
            const sb = document.getElementById('sb');
            if (window.innerWidth <= 680 && sb.classList.contains('open')) {
                sb.classList.remove('open');
                document.getElementById('mb').textContent = '☰';
            }
        }
        function adj(d) { const i = ORDER.indexOf(cur); const n = ORDER[i + d]; if (n) { const el = document.querySelector(`.si[data-id="${n}"]`); go(el, n); } }

        document.getElementById('mb').addEventListener('click', () => {
            const sb = document.getElementById('sb'), btn = document.getElementById('mb');
            sb.classList.toggle('open');
            btn.textContent = sb.classList.contains('open') ? '✕' : '☰';
        });
        render('0');
    </script>
